<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>
    
    <style>
        body {
            background-color: #121212; /* A nice, soft dark gray */
            color: #ffffff; /* White text so you can read it */
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        /* This is the styling for your Magic Popup Card */
        .magic-card {
            background-color: #2a2a2a; /* Slightly lighter gray to stand out */
            width: 300px;
            margin: 0 auto; /* This centers the card on the screen */
            padding: 20px;
            border-radius: 12px; /* Smooth, rounded corners */
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5); /* A subtle shadow */
        }

        h1 {
            color: #4da6ff; /* A calming blue for the title */
        }
    </style>

</head>
<body>

    <h1>AI Teaching Assistant</h1>
    <p>Listening to the professor...</p>

    <div class="magic-card">
        <h2>🏭 Powerhouse</h2>
        <p>The mitochondria is the powerhouse of the cell.</p>
    </div>

</body>
</html>
